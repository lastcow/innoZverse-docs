<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#02101f"/>
      <stop offset="100%" style="stop-color:#040e1a"/>
    </linearGradient>
    <linearGradient id="cy" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigglow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Glow orb -->
  <circle cx="200" cy="85" r="60" fill="#06b6d4" opacity="0.04"/>
  <!-- Neural network -->
  <g filter="url(#glow)">
    <!-- Layer 1: inputs -->
    <circle cx="50" cy="45" r="7" fill="#0e2a35" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="50" cy="75" r="7" fill="#0e2a35" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="50" cy="105" r="7" fill="#0e2a35" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="50" cy="135" r="7" fill="#0e2a35" stroke="#06b6d4" stroke-width="1.5"/>
    <!-- Layer 2 -->
    <circle cx="130" cy="55" r="7" fill="#0e2a35" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="130" cy="85" r="7" fill="#0e2a35" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="130" cy="115" r="7" fill="#0e2a35" stroke="#22d3ee" stroke-width="1.5"/>
    <!-- Layer 3 -->
    <circle cx="210" cy="65" r="7" fill="#0e2a35" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="210" cy="95" r="7" fill="#0e2a35" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="210" cy="125" r="7" fill="#0e2a35" stroke="#06b6d4" stroke-width="1.5"/>
    <!-- Layer 4: output -->
    <circle cx="290" cy="75" r="8" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="290" cy="105" r="8" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="2"/>
    <!-- Connections L1→L2 -->
    <g stroke="#06b6d4" stroke-width="0.6" opacity="0.4">
      <line x1="57" y1="45" x2="123" y2="55"/><line x1="57" y1="45" x2="123" y2="85"/>
      <line x1="57" y1="75" x2="123" y2="55"/><line x1="57" y1="75" x2="123" y2="85"/>
      <line x1="57" y1="75" x2="123" y2="115"/><line x1="57" y1="105" x2="123" y2="85"/>
      <line x1="57" y1="105" x2="123" y2="115"/><line x1="57" y1="135" x2="123" y2="115"/>
    </g>
    <!-- Connections L2→L3 -->
    <g stroke="#22d3ee" stroke-width="0.6" opacity="0.4">
      <line x1="137" y1="55" x2="203" y2="65"/><line x1="137" y1="55" x2="203" y2="95"/>
      <line x1="137" y1="85" x2="203" y2="65"/><line x1="137" y1="85" x2="203" y2="95"/>
      <line x1="137" y1="85" x2="203" y2="125"/><line x1="137" y1="115" x2="203" y2="95"/>
      <line x1="137" y1="115" x2="203" y2="125"/>
    </g>
    <!-- Connections L3→L4 -->
    <g stroke="#06b6d4" stroke-width="0.8" opacity="0.6">
      <line x1="217" y1="65" x2="282" y2="75"/><line x1="217" y1="95" x2="282" y2="75"/>
      <line x1="217" y1="95" x2="282" y2="105"/><line x1="217" y1="125" x2="282" y2="105"/>
    </g>
  </g>
  <!-- Output labels -->
  <g font-family="ui-monospace,monospace" font-size="9" filter="url(#glow)">
    <text x="304" y="79" fill="#06b6d4">THREAT</text>
    <text x="304" y="109" fill="#22d3ee">BENIGN</text>
  </g>
  <!-- Score bar -->
  <rect x="340" y="65" width="10" height="55" rx="3" fill="#0e2a35" stroke="#06b6d4" stroke-width="1"/>
  <rect x="340" y="65" width="10" height="37" rx="3" fill="#06b6d4" opacity="0.7"/>
  <text x="357" y="92" font-family="ui-monospace,monospace" font-size="8" fill="#22d3ee">0.94</text>
  <!-- Input labels -->
  <g font-family="ui-monospace,monospace" font-size="7.5" fill="#475569">
    <text x="20" y="48">pkt_size</text>
    <text x="20" y="78">duration</text>
    <text x="20" y="108">src_port</text>
    <text x="20" y="138">protocol</text>
  </g>
  <!-- Label -->
  <rect x="0" y="160" width="400" height="40" fill="#02101f" opacity="0.95"/>
  <rect x="0" y="158" width="400" height="2" fill="url(#cy)"/>
  <text x="20" y="185" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white">🤖 AI &amp; Machine Learning</text>
  <text x="200" y="182" font-family="ui-monospace,monospace" font-size="10" fill="#22d3ee" text-anchor="end">60 labs · Foundations→Advanced</text>
</svg>
