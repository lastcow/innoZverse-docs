<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16"/>
      <stop offset="100%" style="stop-color:#0a1a0d"/>
    </linearGradient>
    <linearGradient id="gn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.07" stroke="#22c55e" stroke-width="0.5">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
  </g>
  <!-- Terminal window -->
  <rect x="200" y="20" width="185" height="130" rx="8" fill="#0f1a10" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <rect x="200" y="20" width="185" height="22" rx="8" fill="#22c55e" opacity="0.2"/>
  <circle cx="216" cy="31" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="230" cy="31" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="244" cy="31" r="4" fill="#22c55e" opacity="0.8"/>
  <!-- Code lines -->
  <g font-family="ui-monospace,monospace" font-size="10" filter="url(#glow)">
    <text x="212" y="60" fill="#22c55e">$ ls -la /etc/</text>
    <text x="212" y="75" fill="#4ade80">drwxr-xr-x  root root</text>
    <text x="212" y="88" fill="#86efac">-rw-r--r--  passwd</text>
    <text x="212" y="101" fill="#86efac">-rw-------  shadow</text>
    <text x="212" y="114" fill="#22c55e">$ sudo chmod 750</text>
    <text x="212" y="127" fill="#4ade80">$ systemctl status</text>
    <rect x="212" y="133" width="6" height="10" fill="#22c55e" opacity="0.9"/>
  </g>
  <!-- Tux penguin silhouette (simple) -->
  <g transform="translate(40,30)" opacity="0.9">
    <ellipse cx="55" cy="90" rx="40" ry="55" fill="#1a1a1a"/>
    <ellipse cx="55" cy="85" rx="26" ry="38" fill="white" opacity="0.9"/>
    <ellipse cx="55" cy="35" rx="28" ry="28" fill="#1a1a1a"/>
    <circle cx="45" cy="28" r="6" fill="white"/>
    <circle cx="65" cy="28" r="6" fill="white"/>
    <circle cx="45" cy="29" r="3" fill="#1a1a1a"/>
    <circle cx="65" cy="29" r="3" fill="#1a1a1a"/>
    <path d="M48 42 Q55 50 62 42" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="40" cy="100" rx="15" ry="8" fill="#f59e0b" transform="rotate(-15,40,100)"/>
    <ellipse cx="70" cy="100" rx="15" ry="8" fill="#f59e0b" transform="rotate(15,70,100)"/>
  </g>
  <!-- Label -->
  <rect x="0" y="160" width="400" height="40" fill="#052e16" opacity="0.9"/>
  <rect x="0" y="158" width="400" height="2" fill="url(#gn)"/>
  <text x="20" y="185" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white">🐧 Linux</text>
  <text x="200" y="182" font-family="ui-monospace,monospace" font-size="10" fill="#4ade80" text-anchor="end">80 labs · 4 levels</text>
</svg>
