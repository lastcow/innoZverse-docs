<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020d1f"/>
      <stop offset="100%" style="stop-color:#050e20"/>
    </linearGradient>
    <linearGradient id="bl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- World map dots approximation -->
  <g opacity="0.12" fill="#0ea5e9">
    <circle cx="60" cy="70" r="1.5"/><circle cx="75" cy="65" r="1.5"/><circle cx="90" cy="72" r="1.5"/>
    <circle cx="65" cy="80" r="1.5"/><circle cx="80" cy="78" r="1.5"/><circle cx="95" cy="68" r="1.5"/>
    <circle cx="110" cy="60" r="1.5"/><circle cx="125" cy="55" r="1.5"/><circle cx="140" cy="62" r="1.5"/>
    <circle cx="130" cy="72" r="1.5"/><circle cx="145" cy="78" r="1.5"/><circle cx="160" cy="65" r="1.5"/>
    <circle cx="55" cy="90" r="1.5"/><circle cx="70" cy="95" r="1.5"/><circle cx="85" cy="88" r="1.5"/>
  </g>
  <!-- Network topology -->
  <g filter="url(#glow)">
    <!-- Core router -->
    <rect x="175" y="75" width="50" height="35" rx="5" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="200" y="97" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#38bdf8">CORE</text>
    <!-- Connections -->
    <line x1="200" y1="75" x2="100" y2="40" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
    <line x1="200" y1="75" x2="300" y2="40" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
    <line x1="200" y1="110" x2="100" y2="145" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
    <line x1="200" y1="110" x2="300" y2="145" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
    <line x1="175" y1="92" x2="80" y2="92" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <line x1="225" y1="92" x2="320" y2="92" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <!-- Switches -->
    <rect x="75" y="30" width="50" height="25" rx="4" fill="#0c1a2e" stroke="#0284c7" stroke-width="1"/>
    <text x="100" y="47" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#38bdf8">SW-01</text>
    <rect x="275" y="30" width="50" height="25" rx="4" fill="#0c1a2e" stroke="#0284c7" stroke-width="1"/>
    <text x="300" y="47" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#38bdf8">SW-02</text>
    <rect x="75" y="135" width="50" height="25" rx="4" fill="#0c1a2e" stroke="#0284c7" stroke-width="1"/>
    <text x="100" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#38bdf8">FW-01</text>
    <rect x="275" y="135" width="50" height="25" rx="4" fill="#0c1a2e" stroke="#0284c7" stroke-width="1"/>
    <text x="300" y="152" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#38bdf8">FW-02</text>
    <!-- Internet cloud -->
    <ellipse cx="55" cy="92" rx="20" ry="14" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1" opacity="0.8"/>
    <text x="55" y="96" text-anchor="middle" font-size="11" fill="#38bdf8">🌐</text>
    <!-- Hosts -->
    <circle cx="355" cy="92" r="12" fill="#0c1a2e" stroke="#0284c7" stroke-width="1"/>
    <text x="355" y="96" text-anchor="middle" font-size="11" fill="#7dd3fc">💻</text>
  </g>
  <!-- Packet animation dots -->
  <g opacity="0.8" fill="#38bdf8" filter="url(#glow)">
    <circle cx="150" cy="60" r="2.5"/><circle cx="250" cy="60" r="2.5"/>
    <circle cx="150" cy="125" r="2.5"/><circle cx="250" cy="125" r="2.5"/>
  </g>
  <!-- Label -->
  <rect x="0" y="160" width="400" height="40" fill="#020d1f" opacity="0.95"/>
  <rect x="0" y="158" width="400" height="2" fill="url(#bl)"/>
  <text x="20" y="185" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white">🌐 Networking</text>
  <text x="200" y="182" font-family="ui-monospace,monospace" font-size="10" fill="#38bdf8" text-anchor="end">80 labs · TCP/IP to BGP</text>
</svg>
