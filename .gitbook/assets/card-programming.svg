  <g font-family="ui-monospace,monospace" font-size="9.5" filter="url(#glow)">
    <text x="50" y="55" fill="#c084fc">from</text><text x="78" y="55" fill="#e2e8f0"> fastapi </text><text x="133" y="55" fill="#c084fc">import</text><text x="173" y="55" fill="#e2e8f0"> FastAPI</text>
    <text x="50" y="68" fill="#c084fc">import</text><text x="93" y="68" fill="#e2e8f0"> numpy </text><text x="133" y="68" fill="#c084fc">as</text><text x="148" y="68" fill="#e2e8f0"> np</text>
    <text x="50" y="81" fill="#6b7280"></text>
    <text x="50" y="94" fill="#60a5fa">app</text><text x="71" y="94" fill="#e2e8f0"> = FastAPI()</text>
    <text x="50" y="107" fill="#6b7280"></text>
    <text x="50" y="120" fill="#a78bfa">@app.post</text><text x="113" y="120" fill="#e2e8f0">("/predict")</text>
    <text x="50" y="133" fill="#c084fc">async def</text><text x="107" y="133" fill="#60a5fa"> predict</text><text x="151" y="133" fill="#e2e8f0">(data: dict):</text>
    <text x="62" y="146" fill="#c084fc">return</text><text x="100" y="146" fill="#fbbf24"> {"score"</text><text x="151" y="146" fill="#e2e8f0">: 0.94}</text>
  </g>
