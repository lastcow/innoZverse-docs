<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0d1b2e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#heroBg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="900" cy="200" r="180" fill="#3b82f6" opacity="0.04"/>
  <circle cx="1050" cy="100" r="120" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="200" cy="300" r="150" fill="#06b6d4" opacity="0.04"/>

  <!-- Neural network nodes (right side) -->
  <g opacity="0.25" filter="url(#glow)">
    <!-- Nodes -->
    <circle cx="780" cy="80" r="5" fill="#3b82f6"/>
    <circle cx="860" cy="140" r="5" fill="#8b5cf6"/>
    <circle cx="780" cy="200" r="5" fill="#3b82f6"/>
    <circle cx="860" cy="260" r="5" fill="#8b5cf6"/>
    <circle cx="780" cy="320" r="5" fill="#3b82f6"/>
    <circle cx="950" cy="110" r="5" fill="#06b6d4"/>
    <circle cx="950" cy="200" r="5" fill="#06b6d4"/>
    <circle cx="950" cy="290" r="5" fill="#06b6d4"/>
    <circle cx="1040" cy="155" r="5" fill="#a78bfa"/>
    <circle cx="1040" cy="245" r="5" fill="#a78bfa"/>
    <circle cx="1130" cy="200" r="6" fill="#60a5fa"/>
    <!-- Connections -->
    <line x1="780" y1="80" x2="860" y2="140" stroke="#3b82f6" stroke-width="0.8"/>
    <line x1="780" y1="80" x2="860" y2="260" stroke="#3b82f6" stroke-width="0.4"/>
    <line x1="780" y1="200" x2="860" y2="140" stroke="#3b82f6" stroke-width="0.8"/>
    <line x1="780" y1="200" x2="860" y2="260" stroke="#3b82f6" stroke-width="0.8"/>
    <line x1="780" y1="320" x2="860" y2="260" stroke="#3b82f6" stroke-width="0.8"/>
    <line x1="860" y1="140" x2="950" y2="110" stroke="#8b5cf6" stroke-width="0.8"/>
    <line x1="860" y1="140" x2="950" y2="200" stroke="#8b5cf6" stroke-width="0.8"/>
    <line x1="860" y1="260" x2="950" y2="200" stroke="#8b5cf6" stroke-width="0.8"/>
    <line x1="860" y1="260" x2="950" y2="290" stroke="#8b5cf6" stroke-width="0.8"/>
    <line x1="950" y1="110" x2="1040" y2="155" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="950" y1="200" x2="1040" y2="155" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="950" y1="200" x2="1040" y2="245" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="950" y1="290" x2="1040" y2="245" stroke="#06b6d4" stroke-width="0.8"/>
    <line x1="1040" y1="155" x2="1130" y2="200" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="1040" y1="245" x2="1130" y2="200" stroke="#a78bfa" stroke-width="0.8"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="158" width="220" height="3" rx="2" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Badge -->
  <rect x="80" y="110" width="130" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <rect x="80" y="110" width="130" height="28" rx="14" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <text x="145" y="129" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#60a5fa" font-weight="500">465+ VERIFIED LABS</text>

  <!-- Main title -->
  <text x="80" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-2">inno<tspan fill="url(#accentGrad)">Zverse</tspan></text>

  <!-- Subtitle -->
  <text x="80" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#94a3b8" font-weight="400" letter-spacing="0.5">The practitioner's knowledge base. Learn by doing.</text>

  <!-- Tag row -->
  <g font-family="ui-monospace,monospace" font-size="12" fill="#475569">
    <text x="80" y="310">Linux</text>
    <text x="134" y="310" fill="#334155">·</text>
    <text x="145" y="310">Cybersecurity</text>
    <text x="247" y="310" fill="#334155">·</text>
    <text x="258" y="310">Networking</text>
    <text x="338" y="310" fill="#334155">·</text>
    <text x="349" y="310">Database</text>
    <text x="415" y="310" fill="#334155">·</text>
    <text x="426" y="310">Programming</text>
    <text x="522" y="310" fill="#334155">·</text>
    <text x="533" y="310">AI &amp; ML</text>
  </g>

  <!-- Bottom gradient fade -->
  <rect x="0" y="340" width="1200" height="60" fill="url(#glowGrad)" opacity="0.3"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
