<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1e"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="brain-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Grid lines -->
  <g stroke="#2d1f5e" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="980" cy="80" r="130" fill="#8b5cf6" opacity="0.07"/>
  <circle cx="1100" cy="320" r="90" fill="#06b6d4" opacity="0.08"/>
  <circle cx="60" cy="320" r="70" fill="#8b5cf6" opacity="0.05"/>

  <!-- Neural network visualization -->
  <g transform="translate(760, 40)" filter="url(#glow)" opacity="0.9">
    <!-- Connections (lines first, behind nodes) -->
    <!-- Layer 1→2 -->
    <line x1="30" y1="80"  x2="130" y2="50"  stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="80"  x2="130" y2="150" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="80"  x2="130" y2="250" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="180" x2="130" y2="50"  stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="180" x2="130" y2="150" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="180" x2="130" y2="250" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="280" x2="130" y2="150" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="280" x2="130" y2="250" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <!-- Layer 2→3 -->
    <line x1="130" y1="50"  x2="230" y2="100" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <line x1="130" y1="50"  x2="230" y2="200" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <line x1="130" y1="150" x2="230" y2="100" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="130" y1="150" x2="230" y2="200" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <line x1="130" y1="250" x2="230" y2="100" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <line x1="130" y1="250" x2="230" y2="200" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <!-- Layer 3→4 -->
    <line x1="230" y1="100" x2="330" y2="150" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
    <line x1="230" y1="200" x2="330" y2="150" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>

    <!-- Layer 1: Input nodes -->
    <circle cx="30"  cy="80"  r="14" fill="#1a1040" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="30"  cy="180" r="14" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="30"  cy="280" r="14" fill="#1a1040" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Layer 2: Hidden nodes -->
    <circle cx="130" cy="50"  r="14" fill="#1a1040" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="130" cy="150" r="16" fill="#06b6d4" opacity="0.85"/>
    <circle cx="130" cy="250" r="14" fill="#1a1040" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Layer 3: Hidden nodes -->
    <circle cx="230" cy="100" r="16" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="230" cy="200" r="16" fill="#06b6d4" opacity="0.7"/>
    <!-- Layer 4: Output node -->
    <circle cx="330" cy="150" r="20" fill="url(#brain-grad)" opacity="0.95"/>
    <text x="330" y="156" fill="white" font-size="14" font-weight="700" text-anchor="middle">AI</text>
  </g>

  <!-- Code snippet decoration -->
  <g transform="translate(870, 230)">
    <rect width="270" height="130" rx="8" fill="#13102e" stroke="#2d1f5e" stroke-width="1"/>
    <rect width="270" height="26" rx="8" fill="#2d1f5e"/>
    <rect y="18" width="270" height="8" fill="#2d1f5e"/>
    <circle cx="14" cy="13" r="5" fill="#ef4444"/>
    <circle cx="30" cy="13" r="5" fill="#eab308"/>
    <circle cx="46" cy="13" r="5" fill="#22c55e"/>
    <text x="12" y="52" fill="#8b5cf6" font-size="10.5" font-family="monospace">model = GradientBoosting()</text>
    <text x="12" y="68" fill="#64748b" font-size="10.5" font-family="monospace">model.fit(X_train, y_train)</text>
    <text x="12" y="84" fill="#06b6d4" font-size="10.5" font-family="monospace">auc = roc_auc_score(y_test,</text>
    <text x="12" y="100" fill="#06b6d4" font-size="10.5" font-family="monospace">      model.predict_proba(X))</text>
    <text x="12" y="118" fill="#22c55e" font-size="10.5" font-family="monospace"># AUC: 0.9913 ✓</text>
  </g>

  <!-- Main text -->
  <text x="80" y="115" fill="#f1f5f9" font-size="52" font-weight="700" letter-spacing="-1">AI &amp; Machine Learning</text>
  <text x="80" y="162" fill="#94a3b8" font-size="21" font-weight="400">From neural networks to production pipelines</text>
  <text x="80" y="196" fill="#94a3b8" font-size="21" font-weight="400">with real, verified code on every page</text>

  <!-- Stats row -->
  <g transform="translate(80, 248)">
    <rect width="148" height="70" rx="10" fill="#13102e" stroke="#2d1f5e" stroke-width="1"/>
    <text x="74" y="30" fill="#8b5cf6" font-size="28" font-weight="700" text-anchor="middle">40</text>
    <text x="74" y="52" fill="#64748b" font-size="13" text-anchor="middle">Verified Labs</text>

    <rect x="168" width="148" height="70" rx="10" fill="#13102e" stroke="#2d1f5e" stroke-width="1"/>
    <text x="242" y="30" fill="#06b6d4" font-size="28" font-weight="700" text-anchor="middle">4</text>
    <text x="242" y="52" fill="#64748b" font-size="13" text-anchor="middle">Skill Levels</text>

    <rect x="336" width="148" height="70" rx="10" fill="#13102e" stroke="#2d1f5e" stroke-width="1"/>
    <text x="410" y="30" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">Docker</text>
    <text x="410" y="52" fill="#64748b" font-size="13" text-anchor="middle">All Verified</text>

    <rect x="504" width="148" height="70" rx="10" fill="#13102e" stroke="#2d1f5e" stroke-width="1"/>
    <text x="578" y="30" fill="#f59e0b" font-size="22" font-weight="700" text-anchor="middle">SecOps</text>
    <text x="578" y="52" fill="#64748b" font-size="13" text-anchor="middle">Theme</text>
  </g>

  <text x="80" y="385" fill="#475569" font-size="13">innozverse.com · docs.innozverse.com/artificial-intelligent-ai</text>
</svg>
