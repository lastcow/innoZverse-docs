<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="#0f172a" rx="12"/>

  <!-- Connecting arrows -->
  <g stroke="#334155" stroke-width="2" fill="#334155">
    <line x1="278" y1="110" x2="298" y2="110"/>
    <polygon points="296,104 308,110 296,116"/>
    <line x1="578" y1="110" x2="598" y2="110"/>
    <polygon points="596,104 608,110 596,116"/>
    <line x1="878" y1="110" x2="898" y2="110"/>
    <polygon points="896,104 908,110 896,116"/>
  </g>

  <!-- Card 1: Foundations -->
  <g transform="translate(20, 20)">
    <rect width="258" height="180" rx="12" fill="#1e293b" stroke="#1d4ed8" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g1)"/>
    <!-- Icon -->
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#1d4ed8" opacity="0.2"/>
    <text x="38" y="48" fill="#3b82f6" font-size="20" text-anchor="middle">🌱</text>
    <!-- Label -->
    <text x="68" y="36" fill="#3b82f6" font-size="11" font-weight="600" letter-spacing="1">LEVEL 1</text>
    <text x="68" y="54" fill="#f1f5f9" font-size="16" font-weight="700">Foundations</text>
    <!-- Divider -->
    <line x1="20" y1="72" x2="238" y2="72" stroke="#334155" stroke-width="1"/>
    <!-- Topics -->
    <text x="20" y="94" fill="#94a3b8" font-size="12">· OSI Model &amp; TCP/IP</text>
    <text x="20" y="112" fill="#94a3b8" font-size="12">· Cryptography &amp; Hashing</text>
    <text x="20" y="130" fill="#94a3b8" font-size="12">· Attack Vectors &amp; Recon</text>
    <text x="20" y="148" fill="#94a3b8" font-size="12">· Password Security &amp; OSINT</text>
    <!-- Badge -->
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#1d4ed8" opacity="0.3"/>
    <text x="45" y="169" fill="#3b82f6" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 2: Practitioner -->
  <g transform="translate(320, 20)">
    <rect width="258" height="180" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g2)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#7c3aed" opacity="0.2"/>
    <text x="38" y="48" fill="#a855f7" font-size="20" text-anchor="middle">⚔️</text>
    <text x="68" y="36" fill="#a855f7" font-size="11" font-weight="600" letter-spacing="1">LEVEL 2</text>
    <text x="68" y="54" fill="#f1f5f9" font-size="16" font-weight="700">Practitioner</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#334155" stroke-width="1"/>
    <text x="20" y="94" fill="#94a3b8" font-size="12">· OWASP Top 10 (A01–A10)</text>
    <text x="20" y="112" fill="#94a3b8" font-size="12">· Web App Penetration Testing</text>
    <text x="20" y="130" fill="#94a3b8" font-size="12">· Burp Suite &amp; API Security</text>
    <text x="20" y="148" fill="#94a3b8" font-size="12">· Auth Bypass &amp; Session Attacks</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#7c3aed" opacity="0.3"/>
    <text x="45" y="169" fill="#a855f7" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 3: Advanced -->
  <g transform="translate(620, 20)">
    <rect width="258" height="180" rx="12" fill="#1e293b" stroke="#dc2626" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g3)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#dc2626" opacity="0.2"/>
    <text x="38" y="48" fill="#f87171" font-size="20" text-anchor="middle">🔴</text>
    <text x="68" y="36" fill="#f87171" font-size="11" font-weight="600" letter-spacing="1">LEVEL 3</text>
    <text x="68" y="54" fill="#f1f5f9" font-size="16" font-weight="700">Advanced</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#334155" stroke-width="1"/>
    <text x="20" y="94" fill="#94a3b8" font-size="12">· Network &amp; AD Penetration</text>
    <text x="20" y="112" fill="#94a3b8" font-size="12">· Privilege Escalation</text>
    <text x="20" y="130" fill="#94a3b8" font-size="12">· Malware Analysis &amp; Forensics</text>
    <text x="20" y="148" fill="#94a3b8" font-size="12">· Threat Hunting &amp; Red Team</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#dc2626" opacity="0.3"/>
    <text x="45" y="169" fill="#f87171" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 4: Architect -->
  <g transform="translate(920, 20)">
    <rect width="258" height="180" rx="12" fill="#1e293b" stroke="#d97706" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g4)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#d97706" opacity="0.2"/>
    <text x="38" y="48" fill="#fbbf24" font-size="20" text-anchor="middle">🏛️</text>
    <text x="68" y="36" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="1">LEVEL 4</text>
    <text x="68" y="54" fill="#f1f5f9" font-size="16" font-weight="700">Architect</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#334155" stroke-width="1"/>
    <text x="20" y="94" fill="#94a3b8" font-size="12">· Security Architecture &amp; ZTA</text>
    <text x="20" y="112" fill="#94a3b8" font-size="12">· SOC 2, ISO 27001, GDPR</text>
    <text x="20" y="130" fill="#94a3b8" font-size="12">· DevSecOps &amp; Cloud Security</text>
    <text x="20" y="148" fill="#94a3b8" font-size="12">· Enterprise Risk &amp; Threat Model</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#d97706" opacity="0.3"/>
    <text x="45" y="169" fill="#fbbf24" font-size="10" text-anchor="middle">20 Labs</text>
  </g>
</svg>
