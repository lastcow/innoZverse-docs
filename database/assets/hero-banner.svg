<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1445"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Grid lines -->
  <g stroke="#312e81" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Glow circles -->
  <circle cx="980" cy="100" r="140" fill="#6366f1" opacity="0.05"/>
  <circle cx="1100" cy="320" r="80" fill="#06b6d4" opacity="0.06"/>

  <!-- Database cylinder stack (right side) -->
  <g transform="translate(760, 40)">
    <!-- DB 1 (bottom) -->
    <ellipse cx="130" cy="300" rx="100" ry="22" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="30" y="245" width="200" height="56" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
    <ellipse cx="130" cy="245" rx="100" ry="22" fill="#4338ca" stroke="#6366f1" stroke-width="1.5"/>
    <text x="130" y="250" fill="#a5b4fc" font-size="11" text-anchor="middle" font-family="monospace">PostgreSQL</text>

    <!-- DB 2 (middle) -->
    <ellipse cx="130" cy="210" rx="100" ry="22" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <rect x="30" y="155" width="200" height="56" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
    <ellipse cx="130" cy="155" rx="100" ry="22" fill="#4338ca" stroke="#818cf8" stroke-width="1.5"/>
    <text x="130" y="160" fill="#c7d2fe" font-size="11" text-anchor="middle" font-family="monospace">MongoDB</text>

    <!-- DB 3 (top) -->
    <ellipse cx="130" cy="120" rx="100" ry="22" fill="#312e81" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="30" y="65" width="200" height="56" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>
    <ellipse cx="130" cy="65" rx="100" ry="22" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="130" y="70" fill="#67e8f9" font-size="11" text-anchor="middle" font-family="monospace">Redis</text>

    <!-- Connection lines -->
    <line x1="130" y1="43" x2="130" y2="15" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 2"/>
    <circle cx="130" cy="12" r="6" fill="#6366f1"/>
    <text x="130" y="8" fill="#a5b4fc" font-size="10" text-anchor="middle">API</text>
  </g>

  <!-- SQL query box -->
  <g transform="translate(840, 230)">
    <rect width="310" height="140" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <rect width="310" height="28" rx="8" fill="#1e293b"/>
    <rect y="20" width="310" height="8" fill="#1e293b"/>
    <circle cx="16" cy="14" r="5" fill="#ef4444"/>
    <circle cx="34" cy="14" r="5" fill="#eab308"/>
    <circle cx="52" cy="14" r="5" fill="#22c55e"/>
    <text x="155" y="20" fill="#64748b" font-size="10" text-anchor="middle" font-family="monospace">query.sql</text>
    <text x="14" y="52" fill="#818cf8" font-size="11" font-family="monospace">SELECT</text>
    <text x="60" y="52" fill="#e2e8f0" font-size="11" font-family="monospace">u.name, COUNT(o.id)</text>
    <text x="14" y="70" fill="#818cf8" font-size="11" font-family="monospace">FROM</text>
    <text x="52" y="70" fill="#06b6d4" font-size="11" font-family="monospace">users u</text>
    <text x="14" y="88" fill="#818cf8" font-size="11" font-family="monospace">JOIN</text>
    <text x="46" y="88" fill="#06b6d4" font-size="11" font-family="monospace">orders o ON u.id = o.user_id</text>
    <text x="14" y="106" fill="#818cf8" font-size="11" font-family="monospace">WHERE</text>
    <text x="60" y="106" fill="#e2e8f0" font-size="11" font-family="monospace">u.active = true</text>
    <text x="14" y="124" fill="#818cf8" font-size="11" font-family="monospace">GROUP BY</text>
    <text x="80" y="124" fill="#e2e8f0" font-size="11" font-family="monospace">u.name</text>
  </g>

  <!-- Main text -->
  <text x="80" y="118" fill="#e0e7ff" font-size="56" font-weight="700" letter-spacing="-2">Database</text>
  <text x="80" y="165" fill="#a5b4fc" font-size="22" font-weight="400">SQL, NoSQL, design patterns</text>
  <text x="80" y="200" fill="#a5b4fc" font-size="22" font-weight="400">and cloud-scale data engineering</text>

  <!-- Stats -->
  <g transform="translate(80, 248)">
    <rect width="148" height="72" rx="10" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
    <text x="74" y="32" fill="#6366f1" font-size="28" font-weight="700" text-anchor="middle">80</text>
    <text x="74" y="54" fill="#4c4a7a" font-size="13" text-anchor="middle">Hands-on Labs</text>

    <rect x="168" width="148" height="72" rx="10" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
    <text x="242" y="32" fill="#818cf8" font-size="28" font-weight="700" text-anchor="middle">4</text>
    <text x="242" y="54" fill="#4c4a7a" font-size="13" text-anchor="middle">Skill Levels</text>

    <rect x="336" width="148" height="72" rx="10" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
    <text x="410" y="32" fill="#06b6d4" font-size="24" font-weight="700" text-anchor="middle">SQL+</text>
    <text x="410" y="54" fill="#4c4a7a" font-size="13" text-anchor="middle">NoSQL Covered</text>

    <rect x="504" width="148" height="72" rx="10" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
    <text x="578" y="32" fill="#a78bfa" font-size="24" font-weight="700" text-anchor="middle">Cloud</text>
    <text x="578" y="54" fill="#4c4a7a" font-size="13" text-anchor="middle">AWS RDS / Atlas</text>
  </g>

  <text x="80" y="388" fill="#312e81" font-size="13">innozverse.com · docs.innozverse.com/database</text>
</svg>
