    <text x="68" y="36" fill="#22d3ee" font-size="11" font-weight="600" letter-spacing="1">LEVEL 2</text>
    <text x="68" y="54" fill="#e0e7ff" font-size="16" font-weight="700">Practitioner</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#312e81" stroke-width="1"/>
