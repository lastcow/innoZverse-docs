    <text x="45" y="169" fill="#22d3ee" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 3: Advanced -->
  <g transform="translate(620,20)">
    <rect width="258" height="180" rx="12" fill="#1e1b4b" stroke="#065f46" stroke-width="1.5"/>
