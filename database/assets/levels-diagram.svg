    <text x="20" y="112" fill="#67e8f9" font-size="12">· Indexing &amp; query optimisation</text>
    <text x="20" y="130" fill="#67e8f9" font-size="12">· Transactions, ACID, locking</text>
    <text x="20" y="148" fill="#67e8f9" font-size="12">· NoSQL: MongoDB &amp; Redis</text>
