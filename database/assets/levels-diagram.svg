    <text x="45" y="169" fill="#34d399" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 4: Architect -->
  <g transform="translate(920,20)">
    <rect width="258" height="180" rx="12" fill="#1e1b4b" stroke="#92400e" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g4)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#92400e" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">🏛️</text>
    <text x="68" y="36" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="1">LEVEL 4</text>
    <text x="68" y="54" fill="#e0e7ff" font-size="16" font-weight="700">Architect</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#312e81" stroke-width="1"/>
    <text x="20" y="94" fill="#fde68a" font-size="12">· Distributed databases &amp; CAP</text>
    <text x="20" y="112" fill="#fde68a" font-size="12">· Cloud: AWS RDS, DynamoDB, Atlas</text>
    <text x="20" y="130" fill="#fde68a" font-size="12">· Data warehousing &amp; analytics</text>
    <text x="20" y="148" fill="#fde68a" font-size="12">· Migration strategies at scale</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#92400e" opacity="0.4"/>
    <text x="45" y="169" fill="#fbbf24" font-size="10" text-anchor="middle">20 Labs</text>
  </g>
