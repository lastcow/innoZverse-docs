    <rect x="20" y="24" width="36" height="36" rx="8" fill="#065f46" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">🔴</text>
    <text x="68" y="36" fill="#34d399" font-size="11" font-weight="600" letter-spacing="1">LEVEL 3</text>
    <text x="68" y="54" fill="#e0e7ff" font-size="16" font-weight="700">Advanced</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#312e81" stroke-width="1"/>
    <text x="20" y="94" fill="#6ee7b7" font-size="12">· Replication &amp; sharding</text>
    <text x="20" y="112" fill="#6ee7b7" font-size="12">· Performance tuning &amp; EXPLAIN</text>
    <text x="20" y="130" fill="#6ee7b7" font-size="12">· Database security &amp; encryption</text>
    <text x="20" y="148" fill="#6ee7b7" font-size="12">· Backup, recovery &amp; HA</text>
