<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16"/>
      <stop offset="100%" style="stop-color:#14532d"/>
    </linearGradient>
    <linearGradient id="tux-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Grid lines -->
  <g stroke="#166534" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Floating glow circles -->
  <circle cx="960" cy="90" r="130" fill="#22c55e" opacity="0.04"/>
  <circle cx="1100" cy="310" r="80" fill="#16a34a" opacity="0.06"/>
  <circle cx="70" cy="330" r="60" fill="#22c55e" opacity="0.04"/>

  <!-- Terminal window -->
  <g transform="translate(820, 50)">
    <rect width="340" height="300" rx="10" fill="#022c22" stroke="#166534" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="340" height="32" rx="10" fill="#052e16"/>
    <rect y="22" width="340" height="10" fill="#052e16"/>
    <circle cx="18" cy="16" r="6" fill="#ef4444"/>
    <circle cx="38" cy="16" r="6" fill="#eab308"/>
    <circle cx="58" cy="16" r="6" fill="#22c55e"/>
    <text x="170" y="21" fill="#6b7280" font-size="11" text-anchor="middle" font-family="monospace">bash — 80×24</text>
    <!-- Terminal content -->
    <text x="16" y="60" fill="#22c55e" font-size="12" font-family="monospace">user@linux:~$ ls -la /etc/</text>
    <text x="16" y="78" fill="#6b7280" font-size="12" font-family="monospace">total 1.2M</text>
    <text x="16" y="96" fill="#94a3b8" font-size="12" font-family="monospace">drwxr-xr-x  root root  passwd</text>
    <text x="16" y="114" fill="#94a3b8" font-size="12" font-family="monospace">-rw-r--r--  root root  hosts</text>
    <text x="16" y="132" fill="#94a3b8" font-size="12" font-family="monospace">-rw-------  root shadow shadow</text>
    <text x="16" y="158" fill="#22c55e" font-size="12" font-family="monospace">user@linux:~$ chmod 755 script.sh</text>
    <text x="16" y="176" fill="#22c55e" font-size="12" font-family="monospace">user@linux:~$ ./script.sh</text>
    <text x="16" y="194" fill="#4ade80" font-size="12" font-family="monospace">✓ Deployment complete!</text>
    <text x="16" y="220" fill="#22c55e" font-size="12" font-family="monospace">user@linux:~$ systemctl status</text>
    <text x="16" y="238" fill="#4ade80" font-size="12" font-family="monospace">● System running (3d 14h uptime)</text>
    <text x="16" y="264" fill="#22c55e" font-size="12" font-family="monospace">user@linux:~$ <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/><rect x="0" y="-12" width="8" height="14" fill="#22c55e"/></text>
    <!-- Blinking cursor -->
    <rect x="118" y="252" width="8" height="14" fill="#22c55e" opacity="0.9"/>
  </g>

  <!-- Tux penguin (simplified flat) -->
  <g transform="translate(700, 80)" filter="url(#glow)">
    <!-- Body -->
    <ellipse cx="60" cy="130" rx="48" ry="60" fill="#1c1917"/>
    <!-- Belly -->
    <ellipse cx="60" cy="138" rx="30" ry="42" fill="#fef9c3"/>
    <!-- Head -->
    <ellipse cx="60" cy="58" rx="42" ry="40" fill="#1c1917"/>
    <!-- Eyes -->
    <circle cx="46" cy="50" r="10" fill="white"/>
    <circle cx="74" cy="50" r="10" fill="white"/>
    <circle cx="48" cy="52" r="5" fill="#1c1917"/>
    <circle cx="76" cy="52" r="5" fill="#1c1917"/>
    <circle cx="50" cy="50" r="2" fill="white"/>
    <circle cx="78" cy="50" r="2" fill="white"/>
    <!-- Beak -->
    <path d="M52 66 L60 78 L68 66 Z" fill="#f97316"/>
    <!-- Feet -->
    <ellipse cx="42" cy="190" rx="18" ry="8" fill="#f97316"/>
    <ellipse cx="78" cy="190" rx="18" ry="8" fill="#f97316"/>
    <!-- Wings -->
    <path d="M12 110 Q-8 140 14 168" stroke="#1c1917" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M108 110 Q128 140 106 168" stroke="#1c1917" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Green accent ring -->
    <circle cx="60" cy="120" r="70" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="8 4" opacity="0.4"/>
  </g>

  <!-- Main text -->
  <text x="80" y="118" fill="#f0fdf4" font-size="56" font-weight="700" letter-spacing="-2">Linux</text>
  <text x="80" y="165" fill="#86efac" font-size="22" font-weight="400">From first command to production</text>
  <text x="80" y="200" fill="#86efac" font-size="22" font-weight="400">systems engineering</text>

  <!-- Stats -->
  <g transform="translate(80, 248)">
    <rect width="148" height="72" rx="10" fill="#052e16" stroke="#166534" stroke-width="1"/>
    <text x="74" y="32" fill="#22c55e" font-size="28" font-weight="700" text-anchor="middle">80</text>
    <text x="74" y="54" fill="#4b7c5a" font-size="13" text-anchor="middle">Hands-on Labs</text>

    <rect x="168" width="148" height="72" rx="10" fill="#052e16" stroke="#166534" stroke-width="1"/>
    <text x="242" y="32" fill="#4ade80" font-size="28" font-weight="700" text-anchor="middle">4</text>
    <text x="242" y="54" fill="#4b7c5a" font-size="13" text-anchor="middle">Skill Levels</text>

    <rect x="336" width="148" height="72" rx="10" fill="#052e16" stroke="#166534" stroke-width="1"/>
    <text x="410" y="32" fill="#86efac" font-size="28" font-weight="700" text-anchor="middle">bash</text>
    <text x="410" y="54" fill="#4b7c5a" font-size="13" text-anchor="middle">Shell Mastery</text>

    <rect x="504" width="148" height="72" rx="10" fill="#052e16" stroke="#166534" stroke-width="1"/>
    <text x="578" y="32" fill="#a3e635" font-size="28" font-weight="700" text-anchor="middle">RHCSA</text>
    <text x="578" y="54" fill="#4b7c5a" font-size="13" text-anchor="middle">Cert Aligned</text>
  </g>

  <text x="80" y="388" fill="#166534" font-size="13">innozverse.com · docs.innozverse.com/linux</text>
</svg>
