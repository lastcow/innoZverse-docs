<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15803d"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="#052e16" rx="12"/>

  <!-- Arrows -->
  <g stroke="#166534" stroke-width="2" fill="#166534">
    <line x1="278" y1="110" x2="298" y2="110"/>
    <polygon points="296,104 308,110 296,116"/>
    <line x1="578" y1="110" x2="598" y2="110"/>
    <polygon points="596,104 608,110 596,116"/>
    <line x1="878" y1="110" x2="898" y2="110"/>
    <polygon points="896,104 908,110 896,116"/>
  </g>

  <!-- Card 1: Foundations -->
  <g transform="translate(20, 20)">
    <rect width="258" height="180" rx="12" fill="#022c22" stroke="#15803d" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g1)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#15803d" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">🌱</text>
    <text x="68" y="36" fill="#22c55e" font-size="11" font-weight="600" letter-spacing="1">LEVEL 1</text>
    <text x="68" y="54" fill="#f0fdf4" font-size="16" font-weight="700">Foundations</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#166534" stroke-width="1"/>
    <text x="20" y="94" fill="#86efac" font-size="12">· Terminal navigation &amp; filesystem</text>
    <text x="20" y="112" fill="#86efac" font-size="12">· File permissions &amp; ownership</text>
    <text x="20" y="130" fill="#86efac" font-size="12">· Text editing (vim, nano)</text>
    <text x="20" y="148" fill="#86efac" font-size="12">· Package management &amp; users</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#15803d" opacity="0.4"/>
    <text x="45" y="169" fill="#22c55e" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 2: Practitioner -->
  <g transform="translate(320, 20)">
    <rect width="258" height="180" rx="12" fill="#022c22" stroke="#0369a1" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g2)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#0369a1" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">⚙️</text>
    <text x="68" y="36" fill="#38bdf8" font-size="11" font-weight="600" letter-spacing="1">LEVEL 2</text>
    <text x="68" y="54" fill="#f0fdf4" font-size="16" font-weight="700">Practitioner</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#166534" stroke-width="1"/>
    <text x="20" y="94" fill="#7dd3fc" font-size="12">· Shell scripting &amp; automation</text>
    <text x="20" y="112" fill="#7dd3fc" font-size="12">· Process &amp; job management</text>
    <text x="20" y="130" fill="#7dd3fc" font-size="12">· Networking tools &amp; SSH</text>
    <text x="20" y="148" fill="#7dd3fc" font-size="12">· Cron, logs &amp; monitoring</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#0369a1" opacity="0.4"/>
    <text x="45" y="169" fill="#38bdf8" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 3: Advanced -->
  <g transform="translate(620, 20)">
    <rect width="258" height="180" rx="12" fill="#022c22" stroke="#7c3aed" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g3)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#7c3aed" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">🔒</text>
    <text x="68" y="36" fill="#a78bfa" font-size="11" font-weight="600" letter-spacing="1">LEVEL 3</text>
    <text x="68" y="54" fill="#f0fdf4" font-size="16" font-weight="700">Advanced</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#166534" stroke-width="1"/>
    <text x="20" y="94" fill="#c4b5fd" font-size="12">· Kernel tuning &amp; performance</text>
    <text x="20" y="112" fill="#c4b5fd" font-size="12">· Security hardening &amp; SELinux</text>
    <text x="20" y="130" fill="#c4b5fd" font-size="12">· LVM, RAID &amp; storage</text>
    <text x="20" y="148" fill="#c4b5fd" font-size="12">· Containers &amp; systemd mastery</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#7c3aed" opacity="0.4"/>
    <text x="45" y="169" fill="#a78bfa" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 4: Architect -->
  <g transform="translate(920, 20)">
    <rect width="258" height="180" rx="12" fill="#022c22" stroke="#b45309" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g4)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#b45309" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">🏛️</text>
    <text x="68" y="36" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="1">LEVEL 4</text>
    <text x="68" y="54" fill="#f0fdf4" font-size="16" font-weight="700">Architect</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#166534" stroke-width="1"/>
    <text x="20" y="94" fill="#fde68a" font-size="12">· High availability &amp; clustering</text>
    <text x="20" y="112" fill="#fde68a" font-size="12">· Infrastructure as Code (Ansible)</text>
    <text x="20" y="130" fill="#fde68a" font-size="12">· Observability: Prometheus, ELK</text>
    <text x="20" y="148" fill="#fde68a" font-size="12">· Enterprise hardening &amp; compliance</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#b45309" opacity="0.4"/>
    <text x="45" y="169" fill="#fbbf24" font-size="10" text-anchor="middle">20 Labs</text>
  </g>
</svg>
