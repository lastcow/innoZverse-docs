<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a3a"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Grid lines -->
  <g stroke="#1e3a6e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Floating glow circles -->
  <circle cx="960" cy="90" r="130" fill="#3b82f6" opacity="0.04"/>
  <circle cx="1100" cy="310" r="80" fill="#1d4ed8" opacity="0.06"/>
  <circle cx="70" cy="330" r="60" fill="#60a5fa" opacity="0.04"/>

  <!-- Network topology diagram (right side) -->
  <!-- Connection lines -->
  <g stroke="#3b82f6" stroke-width="1.5" opacity="0.5">
    <!-- Core to distribution -->
    <line x1="980" y1="130" x2="880" y2="210"/>
    <line x1="980" y1="130" x2="1080" y2="210"/>
    <!-- Distribution to access -->
    <line x1="880" y1="210" x2="840" y2="300"/>
    <line x1="880" y1="210" x2="920" y2="300"/>
    <line x1="1080" y1="210" x2="1040" y2="300"/>
    <line x1="1080" y1="210" x2="1120" y2="300"/>
    <!-- Internet to core -->
    <line x1="980" y1="50" x2="980" y2="110"/>
  </g>

  <!-- Packet animation along core line -->
  <circle r="5" fill="#60a5fa" opacity="0.8">
    <animateMotion dur="2s" repeatCount="indefinite" path="M980,50 L980,130"/>
  </circle>
  <circle r="5" fill="#60a5fa" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M980,130 L880,210"/>
  </circle>
  <circle r="5" fill="#93c5fd" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M880,210 L840,300"/>
  </circle>

  <!-- Internet cloud -->
  <g transform="translate(950, 30)" filter="url(#glow)">
    <ellipse cx="30" cy="20" rx="40" ry="18" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="30" y="25" fill="#93c5fd" font-size="11" text-anchor="middle" font-family="monospace">Internet</text>
  </g>

  <!-- Core switch (router) -->
  <g transform="translate(950, 108)">
    <rect width="60" height="32" rx="6" fill="#1e3a7e" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="30" y="22" fill="#93c5fd" font-size="10" text-anchor="middle" font-family="monospace">Core</text>
  </g>

  <!-- Distribution switches -->
  <g transform="translate(850, 196)">
    <rect width="60" height="28" rx="5" fill="#1e3a6e" stroke="#60a5fa" stroke-width="1"/>
    <text x="30" y="19" fill="#bfdbfe" font-size="9" text-anchor="middle" font-family="monospace">Dist-1</text>
  </g>
  <g transform="translate(1050, 196)">
    <rect width="60" height="28" rx="5" fill="#1e3a6e" stroke="#60a5fa" stroke-width="1"/>
    <text x="30" y="19" fill="#bfdbfe" font-size="9" text-anchor="middle" font-family="monospace">Dist-2</text>
  </g>

  <!-- Access layer nodes -->
  <g transform="translate(816, 286)">
    <rect width="48" height="24" rx="4" fill="#172554" stroke="#93c5fd" stroke-width="1"/>
    <text x="24" y="17" fill="#dbeafe" font-size="8" text-anchor="middle" font-family="monospace">SW-1</text>
  </g>
  <g transform="translate(896, 286)">
    <rect width="48" height="24" rx="4" fill="#172554" stroke="#93c5fd" stroke-width="1"/>
    <text x="24" y="17" fill="#dbeafe" font-size="8" text-anchor="middle" font-family="monospace">SW-2</text>
  </g>
  <g transform="translate(1016, 286)">
    <rect width="48" height="24" rx="4" fill="#172554" stroke="#93c5fd" stroke-width="1"/>
    <text x="24" y="17" fill="#dbeafe" font-size="8" text-anchor="middle" font-family="monospace">SW-3</text>
  </g>
  <g transform="translate(1096, 286)">
    <rect width="48" height="24" rx="4" fill="#172554" stroke="#93c5fd" stroke-width="1"/>
    <text x="24" y="17" fill="#dbeafe" font-size="8" text-anchor="middle" font-family="monospace">SW-4</text>
  </g>

  <!-- Terminal window (left of diagram) -->
  <g transform="translate(640, 50)">
    <rect width="280" height="240" rx="10" fill="#050d1f" stroke="#1e3a6e" stroke-width="1.5"/>
    <rect width="280" height="32" rx="10" fill="#0c1a3a"/>
    <rect y="22" width="280" height="10" fill="#0c1a3a"/>
    <circle cx="18" cy="16" r="6" fill="#ef4444"/>
    <circle cx="38" cy="16" r="6" fill="#eab308"/>
    <circle cx="58" cy="16" r="6" fill="#22c55e"/>
    <text x="140" y="21" fill="#6b7280" font-size="11" text-anchor="middle" font-family="monospace">bash — network lab</text>
    <text x="14" y="58" fill="#3b82f6" font-size="11" font-family="monospace">$ ip route show</text>
    <text x="14" y="76" fill="#6b7280" font-size="11" font-family="monospace">default via 192.168.1.1</text>
    <text x="14" y="94" fill="#94a3b8" font-size="11" font-family="monospace">192.168.1.0/24 dev eth0</text>
    <text x="14" y="118" fill="#3b82f6" font-size="11" font-family="monospace">$ ping -c3 8.8.8.8</text>
    <text x="14" y="136" fill="#4ade80" font-size="11" font-family="monospace">64 bytes: icmp_seq=1 ttl=117</text>
    <text x="14" y="154" fill="#4ade80" font-size="11" font-family="monospace">64 bytes: icmp_seq=2 ttl=117</text>
    <text x="14" y="172" fill="#4ade80" font-size="11" font-family="monospace">rtt min/avg/max = 8.2/9.1ms</text>
    <text x="14" y="196" fill="#3b82f6" font-size="11" font-family="monospace">$ tcpdump -i eth0 -n</text>
    <text x="14" y="214" fill="#94a3b8" font-size="11" font-family="monospace">IP 10.0.0.1 &gt; 10.0.0.2: TCP</text>
    <rect x="14" y="220" width="8" height="12" fill="#3b82f6" opacity="0.9"/>
  </g>

  <!-- Main text -->
  <text x="80" y="118" fill="#eff6ff" font-size="56" font-weight="700" letter-spacing="-2">Networking</text>
  <text x="80" y="165" fill="#93c5fd" font-size="22" font-weight="400">From first packet to enterprise</text>
  <text x="80" y="200" fill="#93c5fd" font-size="22" font-weight="400">network architecture</text>

  <!-- Stats -->
  <g transform="translate(80, 248)">
    <rect width="148" height="72" rx="10" fill="#0c1a3a" stroke="#1e3a6e" stroke-width="1"/>
    <text x="74" y="32" fill="#3b82f6" font-size="28" font-weight="700" text-anchor="middle">80</text>
    <text x="74" y="54" fill="#1e3a6e" font-size="13" text-anchor="middle" fill="#4b6fa0">Hands-on Labs</text>

    <rect x="168" width="148" height="72" rx="10" fill="#0c1a3a" stroke="#1e3a6e" stroke-width="1"/>
    <text x="242" y="32" fill="#60a5fa" font-size="28" font-weight="700" text-anchor="middle">4</text>
    <text x="242" y="54" fill="#4b6fa0" font-size="13" text-anchor="middle">Skill Levels</text>

    <rect x="336" width="148" height="72" rx="10" fill="#0c1a3a" stroke="#1e3a6e" stroke-width="1"/>
    <text x="410" y="32" fill="#93c5fd" font-size="24" font-weight="700" text-anchor="middle">TCP/IP</text>
    <text x="410" y="54" fill="#4b6fa0" font-size="13" text-anchor="middle">Stack Mastery</text>

    <rect x="504" width="148" height="72" rx="10" fill="#0c1a3a" stroke="#1e3a6e" stroke-width="1"/>
    <text x="578" y="32" fill="#bfdbfe" font-size="24" font-weight="700" text-anchor="middle">CCNA</text>
    <text x="578" y="54" fill="#4b6fa0" font-size="13" text-anchor="middle">Cert Aligned</text>
  </g>

  <text x="80" y="388" fill="#1e3a6e" font-size="13">innozverse.com · docs.innozverse.com/networking</text>
</svg>
