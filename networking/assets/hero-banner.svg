<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeBluGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGreenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeOrangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- Animated Grid Background (subtle) -->
  <g opacity="0.05" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1050" y1="0" x2="1050" y2="400"/>
  </g>

  <!-- Network topology visualization -->
  
  <!-- Connection lines -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.6">
    <!-- Hub to nodes -->
    <line x1="600" y1="200" x2="250" y2="100"/>
    <line x1="600" y1="200" x2="250" y2="300"/>
    <line x1="600" y1="200" x2="950" y2="100"/>
    <line x1="600" y1="200" x2="950" y2="300"/>
    <!-- Cross connections -->
    <line x1="250" y1="100" x2="950" y2="100" opacity="0.3"/>
    <line x1="250" y1="300" x2="950" y2="300" opacity="0.3"/>
  </g>

  <!-- Packet flow animation circles (decorative) -->
  <g opacity="0.4">
    <circle cx="425" cy="150" r="3" fill="#60a5fa">
      <animate attributeName="r" from="3" to="8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="250" r="3" fill="#10b981">
      <animate attributeName="r" from="3" to="8" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Central Hub Node (Router) -->
  <circle cx="600" cy="200" r="35" fill="url(#nodeBluGradient)" filter="url(#glowBlue)"/>
  <g transform="translate(600, 200)">
    <!-- Router icon -->
    <rect x="-15" y="-15" width="30" height="30" fill="none" stroke="#ffffff" stroke-width="2" rx="3"/>
    <circle cx="-8" cy="-8" r="2" fill="#4ade80"/>
    <circle cx="8" cy="-8" r="2" fill="#4ade80"/>
    <circle cx="-8" cy="8" r="2" fill="#4ade80"/>
    <circle cx="8" cy="8" r="2" fill="#4ade80"/>
  </g>

  <!-- Top Left Node (Server) -->
  <circle cx="250" cy="100" r="25" fill="url(#nodeGreenGradient)" filter="url(#glow)"/>
  <g transform="translate(250, 100)">
    <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="2" rx="2"/>
    <line x1="-7" y1="-3" x2="7" y2="-3" stroke="#ffffff" stroke-width="1"/>
    <line x1="-7" y1="2" x2="7" y2="2" stroke="#ffffff" stroke-width="1"/>
    <line x1="-7" y1="7" x2="7" y2="7" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Bottom Left Node (Client) -->
  <circle cx="250" cy="300" r="25" fill="url(#nodeOrangeGradient)" filter="url(#glow)"/>
  <g transform="translate(250, 300)">
    <rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#ffffff" stroke-width="2" rx="2"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- Top Right Node (Cloud/External) -->
  <circle cx="950" cy="100" r="25" fill="url(#nodeBluGradient)" filter="url(#glow)"/>
  <g transform="translate(950, 100)">
    <!-- Cloud icon -->
    <path d="M -12,-3 Q -12,-8 -8,-10 Q -5,-12 0,-12 Q 5,-12 8,-10 Q 12,-8 12,-3 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Bottom Right Node (Mobile/Device) -->
  <circle cx="950" cy="300" r="25" fill="url(#nodeGreenGradient)" filter="url(#glow)"/>
  <g transform="translate(950, 300)">
    <!-- Mobile device icon -->
    <rect x="-8" y="-10" width="16" height="20" fill="none" stroke="#ffffff" stroke-width="2" rx="2"/>
    <circle cx="0" cy="2" r="1.5" fill="#ffffff"/>
  </g>

  <!-- Data packet visualization (moving along connection lines) -->
  <g>
    <!-- Packet 1: Hub to Server -->
    <circle r="4" fill="#60a5fa" opacity="0.8">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#path1" startOffset="0%"/>
      </animateMotion>
    </circle>
    
    <!-- Packet 2: Hub to Client -->
    <circle r="4" fill="#10b981" opacity="0.8">
      <animateMotion dur="3s" begin="1s" repeatCount="indefinite">
        <mpath href="#path2" startOffset="0%"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Invisible paths for packet animation -->
  <path id="path1" d="M 600,200 L 250,100" style="display:none"/>
  <path id="path2" d="M 600,200 L 250,300" style="display:none"/>

  <!-- Title and Subtitle (overlay) -->
  <g>
    <!-- Semi-transparent background for text readability -->
    <rect x="0" y="0" width="1200" height="100" fill="#000000" opacity="0.3"/>
    
    <!-- Title -->
    <text x="600" y="50" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">
      Network Architecture &amp; Security
    </text>
    
    <!-- Subtitle -->
    <text x="600" y="85" font-size="16" fill="#cbd5e1" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.9">
      From TCP/IP fundamentals to enterprise-scale network design and penetration testing
    </text>
  </g>

  <!-- Decorative corner elements -->
  <g opacity="0.2">
    <circle cx="30" cy="30" r="20" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="30" cy="30" r="15" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="1170" cy="370" r="20" fill="none" stroke="#10b981" stroke-width="2"/>
    <circle cx="1170" cy="370" r="15" fill="none" stroke="#10b981" stroke-width="1"/>
  </g>
</svg>