<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="#0c1a3a" rx="12"/>

  <!-- Arrows -->
  <g stroke="#1e3a6e" stroke-width="2" fill="#1e3a6e">
    <line x1="278" y1="110" x2="298" y2="110"/>
    <polygon points="296,104 308,110 296,116"/>
    <line x1="578" y1="110" x2="598" y2="110"/>
    <polygon points="596,104 608,110 596,116"/>
    <line x1="878" y1="110" x2="898" y2="110"/>
    <polygon points="896,104 908,110 896,116"/>
  </g>

  <!-- Card 1: Fundamentals -->
  <g transform="translate(20, 20)">
    <rect width="258" height="180" rx="12" fill="#050d1f" stroke="#1d4ed8" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g1)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#1d4ed8" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">🌐</text>
    <text x="68" y="36" fill="#3b82f6" font-size="11" font-weight="600" letter-spacing="1">LEVEL 1</text>
    <text x="68" y="54" fill="#f0f9ff" font-size="16" font-weight="700">Fundamentals</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#1e3a6e" stroke-width="1"/>
    <text x="20" y="94" fill="#93c5fd" font-size="12">· OSI model &amp; TCP/IP stack</text>
    <text x="20" y="112" fill="#93c5fd" font-size="12">· IPv4/IPv6 &amp; subnetting</text>
    <text x="20" y="130" fill="#93c5fd" font-size="12">· DNS, DHCP &amp; routing</text>
    <text x="20" y="148" fill="#93c5fd" font-size="12">· Switching, VLANs &amp; cloud</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#1d4ed8" opacity="0.4"/>
    <text x="45" y="169" fill="#3b82f6" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 2: Protocols -->
  <g transform="translate(320, 20)">
    <rect width="258" height="180" rx="12" fill="#050d1f" stroke="#0369a1" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g2)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#0369a1" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">📡</text>
    <text x="68" y="36" fill="#38bdf8" font-size="11" font-weight="600" letter-spacing="1">LEVEL 2</text>
    <text x="68" y="54" fill="#f0f9ff" font-size="16" font-weight="700">Protocols</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#1e3a6e" stroke-width="1"/>
    <text x="20" y="94" fill="#7dd3fc" font-size="12">· HTTP/2, HTTPS &amp; TLS</text>
    <text x="20" y="112" fill="#7dd3fc" font-size="12">· DNS zones, SMTP &amp; SSH</text>
    <text x="20" y="130" fill="#7dd3fc" font-size="12">· BGP, OSPF &amp; routing</text>
    <text x="20" y="148" fill="#7dd3fc" font-size="12">· gRPC, MQTT &amp; VPN protocols</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#0369a1" opacity="0.4"/>
    <text x="45" y="169" fill="#38bdf8" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 3: Network Security -->
  <g transform="translate(620, 20)">
    <rect width="258" height="180" rx="12" fill="#050d1f" stroke="#7c3aed" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g3)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#7c3aed" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">🔒</text>
    <text x="68" y="36" fill="#a78bfa" font-size="11" font-weight="600" letter-spacing="1">LEVEL 3</text>
    <text x="68" y="54" fill="#f0f9ff" font-size="16" font-weight="700">Network Security</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#1e3a6e" stroke-width="1"/>
    <text x="20" y="94" fill="#c4b5fd" font-size="12">· iptables, nftables &amp; ufw</text>
    <text x="20" y="112" fill="#c4b5fd" font-size="12">· VPNs: WireGuard &amp; IPsec</text>
    <text x="20" y="130" fill="#c4b5fd" font-size="12">· Snort, Suricata &amp; Nmap</text>
    <text x="20" y="148" fill="#c4b5fd" font-size="12">· Zero Trust &amp; TLS hardening</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#7c3aed" opacity="0.4"/>
    <text x="45" y="169" fill="#a78bfa" font-size="10" text-anchor="middle">20 Labs</text>
  </g>

  <!-- Card 4: Architect -->
  <g transform="translate(920, 20)">
    <rect width="258" height="180" rx="12" fill="#050d1f" stroke="#b45309" stroke-width="1.5"/>
    <rect width="258" height="6" rx="6" fill="url(#g4)"/>
    <rect x="20" y="24" width="36" height="36" rx="8" fill="#b45309" opacity="0.25"/>
    <text x="38" y="48" font-size="20" text-anchor="middle">🏛️</text>
    <text x="68" y="36" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="1">LEVEL 4</text>
    <text x="68" y="54" fill="#f0f9ff" font-size="16" font-weight="700">Architect</text>
    <line x1="20" y1="72" x2="238" y2="72" stroke="#1e3a6e" stroke-width="1"/>
    <text x="20" y="94" fill="#fde68a" font-size="12">· Enterprise network design</text>
    <text x="20" y="112" fill="#fde68a" font-size="12">· SD-WAN &amp; BGP enterprise</text>
    <text x="20" y="130" fill="#fde68a" font-size="12">· Data center CLOS &amp; VXLAN</text>
    <text x="20" y="148" fill="#fde68a" font-size="12">· Multi-cloud &amp; compliance</text>
    <rect x="20" y="158" width="50" height="14" rx="7" fill="#b45309" opacity="0.4"/>
    <text x="45" y="169" fill="#fbbf24" font-size="10" text-anchor="middle">20 Labs</text>
  </g>
</svg>
